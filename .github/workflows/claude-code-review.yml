name: Claude Code Review

on:
  pull_request:
    # Review once per PR — when it opens or leaves draft. Deliberately NOT on
    # `synchronize`, so pushing more commits to a PR doesn't re-run a full (paid)
    # review each time. Re-review on demand by commenting `@claude` (see claude.yml).
    types: [opened, ready_for_review]
    # Don't spend a review on docs-/config-only PRs (only skips when EVERY changed
    # file matches; a mixed code+docs PR still runs).
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip draft PRs.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Add ANTHROPIC_API_KEY in Settings → Secrets and variables → Actions.
          # To bill your Claude subscription instead, run `claude setup-token` and
          # swap this for: claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            Review this pull request. The repo's conventions, architecture, and
            product invariants live in CLAUDE.md at the repo root — read it first
            and hold the PR to it.

            Focus, in priority order:
            1. Correctness bugs and regressions.
            2. Security & the CLAUDE.md product invariants: RLS policies are the
               authorization boundary (not the UI middleware); the TMDB key and Supabase
               service-role key must stay server-only; vote integrity (normalized votes,
               one vote per user); admin-role handling; sanitize stored HTML before render.
            3. Vue 3 / Nuxt 4 / TypeScript discipline (no `any`, explicit return types on
               exports, no floating promises) and consistent Nuxt UI component usage.
            4. Mobile responsiveness and accessibility of any UI changes.
            5. Test coverage for the behavior changed in this PR.

            Leave inline comments on specific lines for concrete issues; mark nits as
            non-blocking. If the PR looks solid, say so briefly — don't invent problems.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
